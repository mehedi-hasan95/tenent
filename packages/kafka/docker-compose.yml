version: "3.8"

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:latest
  networks:
    - kafka-network

x-kafka-common-env: &kafka-common-env
  KAFKA_PROCESS_ROLES: broker,controller

  KAFKA_LISTENERS: >
    PLAINTEXT://:9092,
    CONTROLLER://:9093,
    EXTERNAL://:9094

  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
    CONTROLLER:PLAINTEXT,
    PLAINTEXT:PLAINTEXT,
    EXTERNAL:SASL_PLAINTEXT

  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  KAFKA_CONTROLLER_QUORUM_VOTERS: >
    1@kafka-broker-1:9093,
    2@kafka-broker-2:9093,
    3@kafka-broker-3:9093

  KAFKA_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg

  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

  # SASL
  KAFKA_SASL_ENABLED_MECHANISMS: PLAIN

  KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: PLAIN

  KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: >
    org.apache.kafka.common.security.plain.PlainLoginModule required
    username="admin"
    password="admin-secret"
    user_admin="admin-secret"
    user_client="client-secret";

services:
  kafka-broker-1:
    <<: *kafka-common
    container_name: kafka-broker-1
    hostname: kafka-broker-1

    ports:
      - "9094:9094"

    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka-broker-1:9092,
        EXTERNAL://localhost:9094

  kafka-broker-2:
    <<: *kafka-common
    container_name: kafka-broker-2
    hostname: kafka-broker-2

    ports:
      - "9095:9094"

    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka-broker-2:9092,
        EXTERNAL://localhost:9095

  kafka-broker-3:
    <<: *kafka-common
    container_name: kafka-broker-3
    hostname: kafka-broker-3

    ports:
      - "9096:9094"

    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka-broker-3:9092,
        EXTERNAL://localhost:9096

  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    container_name: kafka-ui

    ports:
      - "8080:8080"

    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3

    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster

      # Internal broker connection
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: >
        kafka-broker-1:9092,
        kafka-broker-2:9092,
        kafka-broker-3:9092

      KAFKA_CLUSTERS_0_READONLY: false

      AUTH_TYPE: LOGIN_FORM

      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: Mehedi
      SPRING_SECURITY_USER_ROLES: ADMIN

    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge
